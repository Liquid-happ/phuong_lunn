<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trái Tim Tỏa Sao Lấp Lánh - Chiếc Bật Lửa Và Váy Công Chúa</title>
<style>
  html, body {
    height: 100%;
    padding: 0;
    margin: 0;
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas {
    position: absolute;
    width: 100%;
    height: 100%;
    /* Nhịp đập giữ nguyên */
    animation: beat 1.2s infinite ease-in-out;
  }
  
  @keyframes beat {
    0% { transform: scale(0.9); }
    30% { transform: scale(1.05); }
    40% { transform: scale(0.95); }
    50% { transform: scale(1.1); }
    100% { transform: scale(0.9); }
  }
</style>
</head>
<body>
<canvas id="pinkboard"></canvas>

<script>
/*
 * Kết hợp: Giao diện bản 1 + Nhịp đập bản 2 + Hiệu ứng tỏa sao lấp lánh
 */
var settings = {
  particles: {
    length:   700, // Tăng nhẹ số lượng để bù cho các ngôi sao tỏa ra
    duration:   2.2, // Thời gian sống
    velocity: 100, // Tốc độ gốc
    effect: -0.75, // Hiệu ứng thu về
    size:      30, // Kích thước gốc
  },
};

(function(){
    var b=0;
    var c=["ms","moz","webkit","o"];
    for(var a=0;a<c.length&&!window.requestAnimationFrame;++a){
        window.requestAnimationFrame=window[c[a]+"RequestAnimationFrame"];
        window.cancelAnimationFrame=window[c[a]+"CancelAnimationFrame"]||window[c[a]+"CancelRequestAnimationFrame"]
    }
    if(!window.requestAnimationFrame){
        window.requestAnimationFrame=function(h,e){
            var d=new Date().getTime();
            var f=Math.max(0,16-(d-b));
            var g=window.setTimeout(function(){h(d+f)},f);
            b=d+f;
            return g
        }
    }
    if(!window.cancelAnimationFrame){
        window.cancelAnimationFrame=function(d){clearTimeout(d)}
    }
}());

var Point = (function() {
  function Point(x, y) {
    this.x = (typeof x !== 'undefined') ? x : 0;
    this.y = (typeof y !== 'undefined') ? y : 0;
  }
  Point.prototype.clone = function() {
    return new Point(this.x, this.y);
  };
  Point.prototype.length = function(length) {
    if (typeof length == 'undefined')
      return Math.sqrt(this.x * this.x + this.y * this.y);
    this.normalize();
    this.x *= length;
    this.y *= length;
    return this;
  };
  Point.prototype.normalize = function() {
    var length = this.length();
    this.x /= length;
    this.y /= length;
    return this;
  };
  return Point;
})();

var Particle = (function() {
  function Particle() {
    this.position = new Point();
    this.velocity = new Point();
    this.acceleration = new Point();
    this.age = 0;
    // Thêm thuộc tính cho sao lấp lánh
    this.isStar = false;
    this.blinkSpeed = 0;
    this.phase = 0;
  }
  Particle.prototype.initialize = function(x, y, dx, dy) {
    // 25% số hạt sẽ biến thành ngôi sao lấp lánh tỏa ra ngoài
    this.isStar = Math.random() < 0.25; 
    
    // Ngôi sao bay nhanh hơn và văng xa hơn (tăng tốc độ gốc)
    var speedMult = this.isStar ? (Math.random() * 1.5 + 1.2) : 1; 
    
    this.position.x = x;
    this.position.y = y;
    this.velocity.x = dx * speedMult;
    this.velocity.y = dy * speedMult;
    
    // Ngôi sao ít bị hút về tâm hơn (giảm lực cản effect)
    var effectMult = this.isStar ? 0.4 : 1; 
    this.acceleration.x = dx * settings.particles.effect * effectMult;
    this.acceleration.y = dy * settings.particles.effect * effectMult;
    
    this.age = 0;
    this.blinkSpeed = Math.random() * 15 + 5; 
    this.phase = Math.random() * Math.PI * 2;
  };
  Particle.prototype.update = function(deltaTime) {
    this.position.x += this.velocity.x * deltaTime;
    this.position.y += this.velocity.y * deltaTime;
    this.velocity.x += this.acceleration.x * deltaTime;
    this.velocity.y += this.acceleration.y * deltaTime;
    this.age += deltaTime;
    if(this.isStar) {
        this.phase += this.blinkSpeed * deltaTime;
    }
  };
  Particle.prototype.draw = function(context, heartImg, starImg) {
    function ease(t) {
      return (--t) * t * t + 1;
    }
    
    var img = this.isStar ? starImg : heartImg;
    var sizeMult = this.isStar ? 0.5 : 1; // Ngôi sao sẽ nhỏ hơn hạt tim một chút
    var size = img.width * ease(this.age / settings.particles.duration) * sizeMult;
    
    var alpha = 1 - this.age / settings.particles.duration;
    
    // Hiệu ứng nhấp nháy (blink) cho ngôi sao
    if (this.isStar) {
        var blinkFactor = (Math.sin(this.phase) + 1) / 2;
        alpha = alpha * (0.2 + blinkFactor * 0.8);
    }
    
    context.globalAlpha = Math.max(0, alpha);
    context.drawImage(img, this.position.x - size / 2, this.position.y - size / 2, size, size);
  };
  return Particle;
})();

var ParticlePool = (function() {
  var particles,
      firstActive = 0,
      firstFree   = 0,
      duration    = settings.particles.duration;
      
  function ParticlePool(length) {
    particles = new Array(length);
    for (var i = 0; i < particles.length; i++)
      particles[i] = new Particle();
  }
  ParticlePool.prototype.add = function(x, y, dx, dy) {
    particles[firstFree].initialize(x, y, dx, dy);
    firstFree++;
    if (firstFree   == particles.length) firstFree   = 0;
    if (firstActive == firstFree       ) firstActive++;
    if (firstActive == particles.length) firstActive = 0;
  };
  ParticlePool.prototype.update = function(deltaTime) {
    var i;
    if (firstActive < firstFree) {
      for (i = firstActive; i < firstFree; i++)
        particles[i].update(deltaTime);
    }
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++)
        particles[i].update(deltaTime);
      for (i = 0; i < firstFree; i++)
        particles[i].update(deltaTime);
    }
    while (particles[firstActive].age >= duration && firstActive != firstFree) {
      firstActive++;
      if (firstActive == particles.length) firstActive = 0;
    }
  };
  ParticlePool.prototype.draw = function(context, heartImg, starImg) {
    var i;
    if (firstActive < firstFree) {
      for (i = firstActive; i < firstFree; i++)
        particles[i].draw(context, heartImg, starImg);
    }
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++)
        particles[i].draw(context, heartImg, starImg);
      for (i = 0; i < firstFree; i++)
        particles[i].draw(context, heartImg, starImg);
    }
  };
  return ParticlePool;
})();

(function(canvas) {
  var context = canvas.getContext('2d'),
      particles = new ParticlePool(settings.particles.length),
      particleRate = settings.particles.length / settings.particles.duration, 
      time;
      
  function pointOnHeart(t) {
    return new Point(
      160 * Math.pow(Math.sin(t), 3),
      130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
    );
  }
  
  // Vẽ hạt hình trái tim
  var heartImage = (function() {
    var canvas  = document.createElement('canvas'),
        context = canvas.getContext('2d');
    canvas.width  = settings.particles.size;
    canvas.height = settings.particles.size;
    
    function to(t) {
      var point = pointOnHeart(t);
      point.x = settings.particles.size / 2 + point.x * settings.particles.size / 350;
      point.y = settings.particles.size / 2 - point.y * settings.particles.size / 350;
      return point;
    }
    
    context.beginPath();
    var t = -Math.PI;
    var point = to(t);
    context.moveTo(point.x, point.y);
    while (t < Math.PI) {
      t += 0.01; 
      point = to(t);
      context.lineTo(point.x, point.y);
    }
    context.closePath();
    
    context.fillStyle = '#ea80b0'; 
    context.fill();
    
    var image = new Image();
    image.src = canvas.toDataURL();
    return image;
  })();

  // Vẽ hạt hình ngôi sao 4 cánh lấp lánh
  var starImage = (function() {
    var canvas  = document.createElement('canvas'),
        context = canvas.getContext('2d');
    canvas.width  = settings.particles.size;
    canvas.height = settings.particles.size;
    
    function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
      var rot = Math.PI / 2 * 3;
      var x = cx, y = cy;
      var step = Math.PI / spikes;

      context.beginPath();
      context.moveTo(cx, cy - outerRadius);
      for (var i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        context.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        context.lineTo(x, y);
        rot += step;
      }
      context.lineTo(cx, cy - outerRadius);
      context.closePath();
    }
    
    drawStar(canvas.width / 2, canvas.height / 2, 4, canvas.width / 2, canvas.width / 8);
    
    context.fillStyle = '#ffffff'; // Sao màu trắng sáng
    context.shadowBlur = 8;
    context.shadowColor = '#ffb3d9'; // Tỏa vầng sáng hồng
    context.fill();
    
    var image = new Image();
    image.src = canvas.toDataURL();
    return image;
  })();
  
  function render() {
    requestAnimationFrame(render);
    
    var newTime   = new Date().getTime() / 1000,
        deltaTime = newTime - (time || newTime);
    time = newTime;
    
    context.clearRect(0, 0, canvas.width, canvas.height);
    
    var amount = particleRate * deltaTime;
    for (var i = 0; i < amount; i++) {
      var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
      var dir = pos.clone().length(settings.particles.velocity);
      particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
    }
    
    particles.update(deltaTime);
    // Truyền cả 2 loại hạt vào hàm vẽ
    particles.draw(context, heartImage, starImage);
  }
  
  function onResize() {
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  window.onresize = onResize;
  
  setTimeout(function() {
    onResize();
    render();
  }, 10);
})(document.getElementById('pinkboard'));
</script>
</body>
</html>
